name: Build Desktop Installers

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows installer
        run: npm run desktop:build:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: vklad-tracker-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error

  build-macos:
    name: Build macOS installer
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build macOS installer
        run: npm run desktop:build:mac

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: vklad-tracker-macos
          path: |
            release/*.dmg
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: error
